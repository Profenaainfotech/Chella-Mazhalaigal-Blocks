<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Latest Blogs</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #eef3ef;
  color: #222;
}

/* PAGE */
.page {
  max-width: 1300px;
  margin: auto;
  padding: 40px 20px;
}

/* TITLE */
.section-title {
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  color: #1f7a3f;
  margin-bottom: 40px;
}

/* GRID */
.blog-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}

.blog-card {
  background: #f7f7f7;
  border: 2px solid #22c55e;
  border-radius: 20px;
  overflow: hidden;

  display: flex;
  flex-direction: column;

  min-height: 420px;
  /* ❌ REMOVE THIS */
  /* width: 400px; */

  transition: all 0.3s ease;
}

/* ✅ CLEAN HOVER LIKE COMPANY */
.blog-card:hover {
  transform: none; /* ❌ stop moving */
  border-color: #16a34a; /* darker green */
  box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
}

/* IMAGE */
.blog-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* CONTENT */
.blog-content {
  padding: 18px 20px 10px;
}

/* TITLE */
.blog-content h3 {
  font-size: 20px;
  font-weight: 700;
  color: #14532d;
  line-height: 1.4;
  margin-bottom: 10px;

  min-height: 56px; /* SAME HEIGHT */
}

/* DESCRIPTION */
.blog-content p {
  font-size: 14.5px;
  color: #444;
  line-height: 1.6;

  min-height: 48px;
}

/* META */
.meta {
  padding: 0 20px;
  margin-top: auto;
}

/* AUTHOR */
.meta .author {
  font-size: 14px;
  color: #555;
  margin-bottom: 4px;
}

/* DATE */
.meta .info {
  font-size: 14px;
  color: #666;
}

.btn {
  margin: 14px 20px 20px;
  padding: 10px 18px;
  background: #22c55e;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  font-size: 14px;

  display: inline-block;
  width: fit-content;

  transition: 0.3s ease;
}

.btn:hover {
  background: #16a34a;
}

/* REMOVE VIEWS */
.views {
  display: none;
}

/* RESPONSIVE */
@media (max-width: 992px) {
  .blog-container {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 576px) {
  .blog-container {
    grid-template-columns: 1fr;
  }

  .section-title {
    font-size: 28px;
  }
}
  </style>
</head>
<body>
  <div class="page">
    <div class="blog-container" id="blogContainer"></div>
  </div>

  <script src="blog.js"></script>
  <script>
const container = document.getElementById("blogContainer");

blogs.forEach(blog => {
  container.innerHTML += `
    <div class="blog-card">

      <img src="${blog.image}" alt="${blog.title}">
      
      <div class="blog-content">
        <h3>${blog.title}</h3>
        <p>${blog.description}</p>
      </div>

      <div class="meta">
        <div class="author">${blog.auther}</div>
        <div class="info">${blog.date} • ${blog.read}</div>
        
        <div class="views">
          <span class="material-icons eye-icon">visibility</span>
          <span>${blog.views}</span>
        </div>
      </div>

      <a href="blog-detail.html?slug=${blog.slug}" class="btn">Know More</a>

    </div>
  `;
});
</script>
<script>
    
</script>
</body>
</html>
