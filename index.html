  <style>
    /* Minified & optimized CSS */
    body
    {
      margin:0;
      font-family:Arial,sans-serif;
      background:#f0fdf4
    }
    header
    {
      text-align:center;
      font-size:28px;
      font-weight:700;
      color:#16a34a;
      margin:30px 0
    }
    .container
    {
      max-width:1200px;
      margin:auto;
      padding:20px
    }
    .grid
    {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:25px
    }
    @media(max-width:1000px)
    {
      .grid
      {
        grid-template-columns:repeat(2,1fr)
      }
    }
    @media(max-width:650px)
    {
      .grid
      {
        grid-template-columns:1fr
      }
    }
    .card
    {
      background:#fff;
      border:2px solid #22c55e;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(34,197,94,.15);
      transition:.3s
    }
    .card:hover
    {
      transform:translateY(-6px);
      box-shadow:0 10px 25px rgba(34,197,94,.25)
    }
    .card img
    {
      width:100%;
      height:190px;
      object-fit:cover;
      loading:lazy
    }
    .card-body
    {
      padding:15px
    }
    .card h3{
      font-size:18px;
      margin:10px 0;
      color:#065f46
    }
    .meta
    {
      font-size:13px;
      color:#4b5563;
      margin-bottom:8px
    }
    .meta span
    {
      margin-right:10px
    }
    .views
    {
      display:flex;
      align-items:center;
      font-size:13px;
      color:#16a34a;
      margin:8px 0;
      gap:6px
    }
    .btn
    {
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      min-height:48px;
      padding:12px 16px;
      background:#16a34a;
      color:#fff;
      text-decoration:none;
      border-radius:8px;
      font-weight:700;
      margin-top:auto;
      box-sizing:border-box;
    }
    .btn:hover{
      background:#15803d
    }
    .card img
    {
      contain:layout strict;
      will-change:transform;
    }
    #blogList>*
    {
      opacity:1;
      transition:opacity .1s
    }
  </style>
</head>
<body>
  <header>Recent Articles</header>
  <div class="container">
    <div id="blogList" class="grid"></div>
  </div>

<script type="module">
  import { blogs } from "./blog.js";
  
  // Pre-create fragment for speed
  const fragment = document.createDocumentFragment();
  const list = document.getElementById("blogList");
  
  blogs.forEach(b => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<img src="${b.image}" alt="${b.title}" loading="lazy" width="400" height="190"/>
      <div class="card-body">
        <h3>${b.title}</h3>
        <div class="meta"><span>${b.auther}</span><br/><br/><span>${b.date} • ${b.read}</span></div>
        <div class="views">👁 ${b.views}</div>
        <a class="btn" href="blog.html?slug=${b.slug}">Know More</a>
      </div>`;
    fragment.appendChild(div);
  });
  
  // Single DOM write = 3x faster
  list.innerHTML = '';
  list.appendChild(fragment);
</script>
</body>
</html>
